<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>
  <script src="./js/app.js" defer></script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

    @layer base {
      :root {
        @apply text-sm;
        line-height: 1.6;
      }
      }
   </style>

</head>
<body class="bg-black p-8 font-sans ">

    <div class="max-w-6xl items-center my-16  mx-auto bg-gray-200 p-6 py-24 rounded-lg shadow-sm border border-gray-200">
        <h1 class="text-2xl font-bold mb-6 flex items-center gap-2">
            <span class="text-red-500">🛒</span> Lista de Compras con Precios
        </h1>

        <!-- Controles -->
        <div class="flex flex-wrap items-end gap-4 mb-6 border-b pb-6">
            <div class="flex mb-4">
                <label class="text-xs font-bold px-3 uppercase text-black">Producto que deseas agregar:</label>
                <input id="input-producto" type="text" placeholder="Ej: Pan, leche" 
                class="border border-gray-400 p-2  cursor-pointer rounded w-48 outline-none focus:ring-2 focus:ring-blue-300">
                <button onclick="agregarProducto()" 
                    class="shrink-0 bg-amber-500 text-white px-4 cursor-pointer py-2 rounded-md p-4 mx-2">
                Agregar
            </button>
            <label class="text-xs font-bold uppercase px-3 text-black">Precio (€):</label>
                <input id="input-precio" type="number" step="0.01" placeholder="0.00" 
                class="border border-gray-400 p-2 cursor-pointer px-3 rounded w-24 outline-none focus:ring-2 focus:ring-blue-300">
            <label class="text-xs font-bold uppercase px-3 text-black">Total:</label>
            <button onclick="calcularTotal()" 
                        class="bg-emerald-500 text-white cursor-pointer px-3 py-2 rounded hover:bg-emerald-600 transition shadow-sm">
                    Total Compras
            </button>
            <label class="text-xs font-bold uppercase px-3 text-black">Vaciar:</label>
            <button onclick="vaciarCarrito()" class="bg-red-400 text-white cursor-pointer px-4 py-2 rounded hover:bg-gray-300 transition"> Vaciar Todos
            </button>

            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Lista -->
            <div>
                <div id="lista-container" class="rounded p-4">
                    <ul id="lista-ul" class="space-y-1 font-mono text-sm">
                        <!-- Formato: 0. PAN, €2.35 -->
                    </ul>
                </div>
                <p class="mt-4 text-gray-600">
                    Items: <span id="contador" class="font-bold">0</span> | 
                    <span id="display-total" class="text-emerald-700 font-bold">Total: €0.00</span>
                </p>
            </div>

            <!-- Eliminar por posición -->
            <div class="bg-orange-50 p-6 rounded-lg border border-orange-200 h-fit">
                <h3 class="font-bold text-orange-800 mb-4">Gestión de posición</h3>
                <div class="flex items-center gap-2">
                    <input id="input-posicion" type="number" value="0" min="0" 
                           class="border border-black cursor-pointer p-2 rounded w-20 text-center">
                    <button onclick="eliminarPorPosicion()" 
                            class="bg-blue-400 text-white  border border-black  px-4 cursor-pointer py-2 rounded hover:bg-orange-600 transition w-full">
                        Eliminar posición
                    </button>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
